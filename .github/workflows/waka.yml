name: Waka Readme

on:
  schedule:
    # 毎日UTC 0:00（日本時間 午前9時）に実行
    - cron: '0 0 * * *'
  workflow_dispatch:

# ここが重要：書き込み権限を明示的に付与
permissions:
  contents: write

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_TITLE: true
          SECTION_NAME: waka
          BLOCKS: ░▒▓█
          TIME_RANGE: last_7_days
          LANG_COUNT: 10
          SHOW_TIME: true
          SHOW_MASKED_TIME: true
